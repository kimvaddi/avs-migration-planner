<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0078D4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#005A9E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F0FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#50E6FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0078D4;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFB900;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="128" height="128" rx="20" ry="20" fill="url(#bgGrad)"/>

  <!-- Subtle grid pattern for tech feel -->
  <g opacity="0.06" stroke="#fff" stroke-width="0.5">
    <line x1="0" y1="32" x2="128" y2="32"/>
    <line x1="0" y1="64" x2="128" y2="64"/>
    <line x1="0" y1="96" x2="128" y2="96"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
  </g>

  <!-- On-prem server rack (left side) -->
  <g filter="url(#shadow)">
    <rect x="14" y="52" width="30" height="11" rx="2" fill="url(#serverGrad)" opacity="0.9"/>
    <circle cx="20" cy="57.5" r="1.5" fill="#003C71"/>
    <rect x="25" y="55.5" width="12" height="1.5" rx="0.75" fill="#003C71" opacity="0.5"/>
    <circle cx="39" cy="57.5" r="1.5" fill="#00FF88"/>

    <rect x="14" y="65" width="30" height="11" rx="2" fill="url(#serverGrad)" opacity="0.9"/>
    <circle cx="20" cy="70.5" r="1.5" fill="#003C71"/>
    <rect x="25" y="68.5" width="12" height="1.5" rx="0.75" fill="#003C71" opacity="0.5"/>
    <circle cx="39" cy="70.5" r="1.5" fill="#00FF88"/>

    <rect x="14" y="78" width="30" height="11" rx="2" fill="url(#serverGrad)" opacity="0.85"/>
    <circle cx="20" cy="83.5" r="1.5" fill="#003C71"/>
    <rect x="25" y="81.5" width="12" height="1.5" rx="0.75" fill="#003C71" opacity="0.5"/>
    <circle cx="39" cy="83.5" r="1.5" fill="#FFB900"/>
  </g>

  <!-- VMware label on servers -->
  <text x="29" y="48" text-anchor="middle" font-size="10" font-family="Segoe UI, sans-serif" font-weight="bold" fill="#50E6FF" opacity="0.9">VM</text>

  <!-- Migration arrow (center) -->
  <g filter="url(#shadow)">
    <path d="M 50 68 L 72 68" stroke="url(#arrowGrad)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <polygon points="72,60 86,68 72,76" fill="url(#arrowGrad)"/>
    <line x1="46" y1="62" x2="52" y2="62" stroke="#FFB900" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
    <line x1="48" y1="74" x2="54" y2="74" stroke="#FFB900" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  </g>

  <!-- Azure cloud (right side) -->
  <g filter="url(#shadow)">
    <path d="M 85,78 C 79,78 75,73 76,67 C 77,61 82,57 88,58 C 89,52 94,48 100,48 C 107,48 113,53 113,60 C 117,60 120,64 120,68 C 120,73 117,77 113,78 Z" fill="url(#cloudGrad)" opacity="0.95"/>
  </g>

  <!-- Azure cross inside cloud -->
  <g opacity="0.8">
    <rect x="96" y="60" width="10" height="3" rx="1.5" fill="#0078D4"/>
    <rect x="99.5" y="56.5" width="3" height="10" rx="1.5" fill="#0078D4"/>
  </g>

  <!-- "AVS" text at bottom -->
  <text x="64" y="106" text-anchor="middle" font-size="18" font-family="Segoe UI, sans-serif" font-weight="800" fill="#FFFFFF" letter-spacing="3">AVS</text>

  <!-- Tagline -->
  <text x="64" y="118" text-anchor="middle" font-size="7" font-family="Segoe UI, sans-serif" font-weight="400" fill="#89D4FF" letter-spacing="1">MIGRATION PLANNER</text>

  <!-- Top accent line -->
  <rect x="30" y="16" width="68" height="2.5" rx="1.25" fill="#50E6FF" opacity="0.6"/>

  <!-- Planning dots / wave nodes -->
  <circle cx="38" cy="26" r="2.5" fill="#50E6FF" opacity="0.4"/>
  <circle cx="50" cy="30" r="2" fill="#50E6FF" opacity="0.3"/>
  <circle cx="60" cy="25" r="3" fill="#FFB900" opacity="0.4"/>
  <circle cx="74" cy="29" r="2" fill="#50E6FF" opacity="0.3"/>
  <circle cx="86" cy="24" r="2.5" fill="#50E6FF" opacity="0.4"/>
  <polyline points="38,26 50,30 60,25 74,29 86,24" fill="none" stroke="#50E6FF" stroke-width="0.8" opacity="0.3"/>
</svg>
